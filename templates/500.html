{% extends 'base.html' %}

{% block title %}Server Error - Smart Restaurant{% endblock %}

{% block content %}
<section class="py-5 min-vh-75 d-flex align-items-center">
    <div class="container text-center">
        <h1 class="display-1 fw-bold text-danger">500</h1>
        <h2 class="mb-3">Server Error</h2>

            Something went wrong on our end. Please try again later.

        <a href="{% url 'restaurant:home' %}" class="btn btn-warning btn-lg">
            <i class="bi bi-house-door me-2"></i>Back to Home

</section>
{% endblock %}
